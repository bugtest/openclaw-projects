# CD 部署工作流

## 触发条件
- CI 构建成功 (main 分支)
- 飞书命令：`/deploy <environment>`
- 飞书命令：`/rollback`

## 流程

```yaml
name: CD Deployment

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

jobs:
  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Notify CDBot Start
        uses: openclaw/notify-action@v1
        with:
          agent: cdbot
          event: deploy_start
          environment: staging
          version: ${{ github.event.workflow_run.head_sha }}
          
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          
      - name: Deploy to Staging
        id: deploy_staging
        run: |
          ./deploy.sh staging
          
      - name: Health Check Staging
        run: |
          ./healthcheck.sh staging
          
      - name: Smoke Test Staging
        run: |
          ./smoke-test.sh staging
          
      - name: Notify CDBot Staging Complete
        if: always()
        uses: openclaw/notify-action@v1
        with:
          agent: cdbot
          event: deploy_complete
          environment: staging
          status: ${{ job.status }}

  deploy-production:
    needs: deploy-staging
    if: ${{ success() }}
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Notify CDBot Production Start
        uses: openclaw/notify-action@v1
        with:
          agent: cdbot
          event: deploy_start
          environment: production
          version: ${{ github.event.workflow_run.head_sha }}
          
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          
      - name: Blue-Green Deploy
        id: deploy_prod
        run: |
          ./deploy-bluegreen.sh production
          
      - name: Health Check Production
        run: |
          ./healthcheck.sh production
          
      - name: Smoke Test Production
        run: |
          ./smoke-test.sh production
          
      - name: Switch Traffic
        run: |
          ./switch-traffic.sh production
          
      - name: Notify CDBot Production Complete
        if: always()
        uses: openclaw/notify-action@v1
        with:
          agent: cdbot
          event: deploy_complete
          environment: production
          status: ${{ job.status }}
```

## CDBot 响应

### 收到部署请求
1. 验证部署版本和权限
2. 在飞书运维群发送部署通知
3. 执行预部署检查
4. 执行部署流程
5. 运行健康检查和冒烟测试
6. 报告部署结果

### 部署策略

#### Staging 环境
- 直接部署
- 自动健康检查
- 自动冒烟测试

#### Production 环境
- 蓝绿部署 (零停机)
- 分阶段流量切换 (10% → 50% → 100%)
- 自动回滚 (如果健康检查失败)

## 飞书消息

### 部署开始 (Staging)
```
🚀 部署助手 | 部署开始

环境：staging
版本：v1.2.3 (abc123d)
部署策略：直接部署

阶段：
1. 下载产物 ✓
2. 部署服务 ⏳
3. 健康检查 ⏳
4. 冒烟测试 ⏳

预计耗时：~3 分钟
```

### 部署完成 (Production)
```
🚀 部署助手 | 部署完成 ✅

环境：production
版本：v1.2.3
部署策略：蓝绿部署

流量切换:
- 蓝环境 (旧): 0% → 已停止
- 绿环境 (新): 100% → 活跃

健康检查:
- API 服务：✅ (延迟 45ms)
- 数据库：✅ (连接正常)
- 缓存：✅ (命中率 98%)
- CDN: ✅ (刷新完成)

访问地址：https://example.com

📊 部署耗时：4m 12s
```

### 部署失败 & 回滚
```
🚨 部署助手 | 部署失败

环境：production
版本：v1.2.3
失败阶段：健康检查

错误信息:
API 服务健康检查失败
- 预期响应时间：< 500ms
- 实际响应时间：2500ms

🔄 正在执行自动回滚...
回滚目标：v1.2.2

回滚进度:
1. 停止新版本 ✓
2. 恢复旧版本 ✓
3. 切换流量 ✓
4. 验证服务 ⏳

已通知 DevBot 创建 Issue 追踪根因
```

### 告警通知
```
⚠️ 部署助手 | 告警通知

级别：🔴 严重
服务：api-gateway
指标：错误率
当前值：8.5%
阈值：5%

可能原因:
- 新版本代码 bug
- 数据库连接池耗尽
- 外部依赖故障

建议操作:
1. 检查应用日志
2. 查看数据库连接数
3. 考虑回滚到 v1.2.2

[查看详情] [执行回滚]
```

## 健康检查

### 检查项
| 检查项 | 方法 | 超时 |
|--------|------|------|
| API 服务 | HTTP GET /health | 5s |
| 数据库 | 连接测试 + 简单查询 | 3s |
| 缓存 | 读写测试 | 2s |
| 外部依赖 | 连接测试 | 5s |

### 冒烟测试
- 用户登录流程
- 核心 API 调用
- 数据读写验证

## 回滚策略

### 自动回滚触发条件
- 健康检查失败
- 错误率 > 5%
- 响应时间 > 2s (持续 1 分钟)

### 回滚流程
1. 停止新版本服务
2. 恢复上一版本
3. 切换流量到旧版本
4. 验证服务健康
5. 发送回滚通知
6. 创建 Issue 追踪根因

## 与 Agent 协作

- **← CIBot**: 接收构建成功通知
- **→ DevBot**: 部署失败时通知创建 Issue
- **→ 飞书群**: 发送部署状态和告警通知
