# 飞书配置

## 机器人配置

### DevBot (开发助手)
```yaml
feishu:
  devbot:
    appId: "cli_a1b2c3d4e5f6g7h8"
    appSecret: "SECRET_HERE"
    verificationToken: "TOKEN_HERE"
    channelId: "oc_dev_team_channel"  # 开发群
    botName: "开发助手"
    commands:
      - /review
      - /approve
      - /create-issue
      - /branch
```

### CIBot (构建助手)
```yaml
feishu:
  cibot:
    appId: "cli_b2c3d4e5f6g7h8i9"
    appSecret: "SECRET_HERE"
    verificationToken: "TOKEN_HERE"
    channelId: "oc_ci_team_channel"  # 构建群
    botName: "构建助手"
    commands:
      - /build
      - /tests
      - /lint
      - /status
      - /cancel
```

### CDBot (部署助手)
```yaml
feishu:
  cdbot:
    appId: "cli_c3d4e5f6g7h8i9j0"
    appSecret: "SECRET_HERE"
    verificationToken: "TOKEN_HERE"
    channelId: "oc_cd_team_channel"  # 运维群
    botName: "部署助手"
    commands:
      - /deploy
      - /rollback
      - /health
      - /status
      - /scale
```

## 消息模板

### 通用格式
```json
{
  "msg_type": "interactive",
  "card": {
    "header": {
      "title": {
        "tag": "plain_text",
        "content": "{{title}}"
      },
      "template": "{{color}}"
    },
    "elements": [
      {
        "tag": "div",
        "text": {
          "tag": "lark_md",
          "content": "{{content}}"
        }
      }
    ]
  }
}
```

### 颜色模板
- 成功：`green`
- 进行中：`blue`
- 警告：`orange`
- 失败：`red`

## 配置说明

1. 在飞书开放平台创建 3 个机器人应用
2. 获取每个应用的 App ID 和 App Secret
3. 配置机器人权限：
   - 发送消息
   - 接收消息
   - 读取群信息
4. 将机器人添加到对应的飞书群
5. 更新此配置文件中的密钥

## 环境变量

```bash
# DevBot
FEISHU_DEVBOT_APP_ID=cli_a1b2c3d4e5f6g7h8
FEISHU_DEVBOT_APP_SECRET=SECRET_HERE

# CIBot
FEISHU_CIBOT_APP_ID=cli_b2c3d4e5f6g7h8i9
FEISHU_CIBOT_APP_SECRET=SECRET_HERE

# CDBot
FEISHU_CDBOT_APP_ID=cli_c3d4e5f6g7h8i9j0
FEISHU_CDBOT_APP_SECRET=SECRET_HERE
```
