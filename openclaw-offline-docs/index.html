            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            outline: none;
        }
        .search-box input:focus { border-color: #4ecdc4; }
        
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        
        .category-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        .category-card:hover {
            transform: translateY(-3px);
            border-color: #ff6b6b;
            background: rgba(255,107,107,0.1);
        }
        .category-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .category-title { font-size: 1.3rem; color: #fff; margin-bottom: 5px; }
        .category-count { color: #4ecdc4; font-size: 0.9rem; margin-bottom: 15px; }
        
        .doc-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }
        .doc-list li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .doc-list a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .doc-list a:hover { color: #ff6b6b; }
        
        .doc-viewer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            overflow-y: auto;
        }
        .doc-viewer.active { display: block; }
        .doc-viewer-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .close-btn {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 2.5rem;
            color: #fff;
            cursor: pointer;
            z-index: 1001;
        }
        .doc-content {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .doc-content h1 { color: #ff6b6b; margin-bottom: 20px; }
        .doc-content h2 { color: #4ecdc4; margin: 30px 0 15px; }
        .doc-content h3 { color: #fff; margin: 25px 0 12px; }
        .doc-content p { margin-bottom: 15px; color: #ccc; }
        .doc-content code {
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Monaco', 'Consolas', monospace;
            color: #ff6b6b;
        }
        .doc-content pre {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
        }
        .doc-content pre code {
            background: none;
            padding: 0;
            color: #e0e0e0;
        }
        .doc-content ul, .doc-content ol {
            margin: 15px 0;
            padding-left: 30px;
            color: #ccc;
        }
        .doc-content li { margin-bottom: 8px; }
        .doc-content a { color: #4ecdc4; }
        .doc-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .doc-content th, .doc-content td {
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            text-align: left;
        }
        .doc-content th { background: rgba(255,255,255,0.1); color: #fff; }
        .doc-content td { color: #ccc; }

            padding: 40px 20px;
            color: #666;
            margin-top: 60px;

                const card = document.createElement('div');
                card.className = 'category-card';
                card.innerHTML = `
                    <div class="category-icon">${info.icon}</div>
                    <div class="category-title">${info.title}</div>
                    <div class="category-count">${files.length} 篇文档</div>
                    <ul class="doc-list">
                        ${files.map(doc => `
                            <li><a href="#" onclick="openDoc('${cat}', '${doc.file}', '${doc.title}'); return false;">${doc.title}</a></li>
                        `).join('')}
                    </ul>
                `;
                container.appendChild(card);
            });
        }
        
        async function openDoc(category, file, title) {
            const viewer = document.getElementById('docViewer');
            const content = document.getElementById('docContent');
            content.innerHTML = '<p>加载中...</p>';
            viewer.classList.add('active');
            
            try {
                const response = await fetch(`${category}/${file}`);
                const text = await response.text();
                const html = parseMarkdown(text);
                content.innerHTML = `<h1>${title}</h1>${html}`;
            } catch (err) {
                content.innerHTML = `<p>加载失败：${err.message}</p>`;
            }
        }
        
        function closeDoc(e) {
            if (e.target.id === 'docViewer') {
                document.getElementById('docViewer').classList.remove('active');
            }
        }
        
        function parseMarkdown(text) {
            // 移除 frontmatter
            text = text.replace(/^---[\s\S]*?---\n\n/, '');
            
            // 简单的 Markdown 解析
            text = text
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^#### (.*$)/gim, '<h4>$1</h4>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                .replace(/`([^`]+)`/gim, '<code>$1</code>')
                .replace(/```(\w*)\n([\s\S]*?)```/gim, '<pre><code>$2</code></pre>')
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
                .replace(/\[(.*?)\]\((.*?)\)/gim, '<a href="$2" target="_blank">$1</a>')
                .replace(/\n/gim, '<br>');
            
            return text;
        }
        
        function searchDocs() {
            const query = document.getElementById('search').value.toLowerCase();
            const cards = document.querySelectorAll('.category-card');
            
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(query) ? 'block' : 'none';
            });
        }
        
        renderCategories();
    </script>
</body>
</html>
